<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mazel Solutions OG Image - Screenshot at 1200x630</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #020817 0%, #0a1628 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Top accent line */
    .og-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0099FF 0%, #00B4D8 100%);
    }

    /* Bottom accent line */
    .og-container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0099FF 0%, #00B4D8 100%);
    }

    /* Subtle glow */
    .glow {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(0, 153, 255, 0.12) 0%, rgba(0, 180, 216, 0.06) 40%, transparent 70%);
      pointer-events: none;
    }

    /* Grid overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 153, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 153, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .company-name {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 72px;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow: 0 0 40px rgba(0, 153, 255, 0.3);
      margin-bottom: 24px;
    }

    .divider {
      width: 300px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #0099FF 0%, #00B4D8 100%);
      margin-bottom: 32px;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 28px;
      letter-spacing: 3px;
      color: #94A3B8;
      margin-bottom: 20px;
    }

    .location {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 20px;
      letter-spacing: 1px;
      color: #64748B;
    }

    .url {
      position: absolute;
      bottom: 40px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 2px;
      color: #0099FF;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <div class="glow"></div>
    <div class="grid-overlay"></div>
    <div class="content">
      <div class="company-name">MAZEL SOLUTIONS</div>
      <div class="divider"></div>
      <div class="tagline">IT Consulting. Development. Security.</div>
      <div class="location">Placer County, CA &nbsp;|&nbsp; Serving All 50 States</div>
    </div>
    <div class="url">mazelsolutions.com</div>
  </div>
</body>
</html>
